name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: ./build-release.sh

      - name: Package zip
        run: |
          cd run/release
          ditto -c -k --sequesterRsrc --keepParent AlwaysHaveAPlan.app ../../AlwaysHaveAPlan.zip

      - name: Package DMG
        run: |
          rm -rf dmg-temp
          mkdir -p dmg-temp
          cp -R run/release/AlwaysHaveAPlan.app dmg-temp/
          ln -s /Applications dmg-temp/Applications
          hdiutil create -volname "AlwaysHaveAPlan" \
            -srcfolder dmg-temp \
            -ov -format UDZO \
            AlwaysHaveAPlan.dmg

      - name: Checksums
        run: shasum -a 256 AlwaysHaveAPlan.dmg AlwaysHaveAPlan.zip > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AlwaysHaveAPlan.dmg
            AlwaysHaveAPlan.zip
            SHA256SUMS.txt
          generate_release_notes: true
